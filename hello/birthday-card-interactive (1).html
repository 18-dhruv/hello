<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #e8b4a8;
    --deep-rose: #c04a2a;
    --blush: #fdf5f0;
    --sage: #8fa890;
    --text: #5a3020;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--rose);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== PARTICLES ===== */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
  }

  /* ===== ENVELOPE SCREEN ===== */
  #envelope-screen {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: var(--rose);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #envelope-screen.hide {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.06);
  }

  .hint-text {
    font-size: 15px;
    color: rgba(90,48,32,0.6);
    letter-spacing: 0.5px;
    animation: pulse-opacity 2s ease-in-out infinite;
  }
  @keyframes pulse-opacity {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ===== ENVELOPE SVG ===== */
  .envelope-wrap {
    cursor: pointer;
    animation: floatEnv 3s ease-in-out infinite;
    filter: drop-shadow(0 20px 50px rgba(232,144,96,0.35));
    transition: filter 0.3s;
  }
  .envelope-wrap:hover {
    filter: drop-shadow(0 24px 60px rgba(232,144,96,0.6));
  }
  @keyframes floatEnv {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }

  .envelope-wrap.opening {
    animation: openEnvelope 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes openEnvelope {
    0%   { transform: scale(1) translateY(0); }
    40%  { transform: scale(1.08) translateY(-10px); }
    100% { transform: scale(0) translateY(60px); opacity: 0; }
  }

  /* Flap animation */
  #env-flap {
    transform-origin: top center;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .envelope-wrap:hover #env-flap,
  .envelope-wrap.opening #env-flap {
    transform: rotateX(160deg);
  }

  /* ===== CARD SCREEN ===== */
  #card-screen {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: var(--rose);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    gap: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    overflow-y: auto;
  }
  #card-screen.show {
    opacity: 1;
    pointer-events: all;
  }

  /* bg leaves */
  .bg-leaf {
    position: fixed;
    pointer-events: none;
    opacity: 0.22;
    z-index: 0;
  }

  /* ===== THE CARD ===== */
  .card-wrap {
    perspective: 1200px;
    z-index: 1;
  }

  .birthday-card {
    width: min(340px, 88vw);
    background: var(--blush);
    border-radius: 20px;
    padding-bottom: 36px;
    position: relative;
    overflow: visible;
    box-shadow: 0 40px 100px rgba(120,60,40,0.3), 0 10px 30px rgba(120,60,40,0.15);
    transform: rotateY(-90deg) scale(0.8);
    opacity: 0;
    transition: transform 1.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.6s ease;
  }

  .birthday-card.revealed {
    transform: rotateY(0deg) scale(1);
    opacity: 1;
  }

  /* floral top-right */
  .card-floral-tr {
    position: absolute;
    top: 0; right: 0;
    width: 155px; height: 155px;
    pointer-events: none;
  }

  /* photo section */
  .card-photo-section {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-photo-frame {
    width: 130px;
    height: 150px;
    background: linear-gradient(135deg, #c8a090, #a07060);
    border-radius: 6px;
    z-index: 2;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(100,50,30,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 11px;
  }

  .card-body {
    padding: 8px 30px 0;
    text-align: center;
  }

  .card-title {
    font-family: 'Dancing Script', cursive;
    font-size: 36px;
    color: var(--deep-rose);
    line-height: 1.1;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s 0.9s ease, transform 0.7s 0.9s ease;
  }
  .card-subtitle {
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: var(--deep-rose);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.7s 1.1s ease, transform 0.7s 1.1s ease;
  }
  .card-divider {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(192,74,42,0.3), transparent);
    margin: 12px auto;
    opacity: 0;
    transition: opacity 0.7s 1.2s ease;
  }
  .card-message {
    font-family: 'Lora', serif;
    font-size: 12.5px;
    color: #7a5040;
    line-height: 1.9;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.7s 1.35s ease, transform 0.7s 1.35s ease;
  }
  .card-heart {
    display: inline-block;
    margin-top: 18px;
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.5s 1.6s ease, transform 0.6s 1.6s cubic-bezier(0.34,1.56,0.64,1);
    animation: none;
  }

  .birthday-card.revealed .card-title,
  .birthday-card.revealed .card-subtitle,
  .birthday-card.revealed .card-divider,
  .birthday-card.revealed .card-message {
    opacity: 1;
    transform: translateY(0);
  }
  .birthday-card.revealed .card-heart {
    opacity: 1;
    transform: scale(1);
    animation: heartBeat 1.2s 2.2s ease-in-out infinite;
  }

  @keyframes heartBeat {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    top: -10px;
    animation: confettiFall linear forwards;
    z-index: 500;
    pointer-events: none;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== OPEN AGAIN BTN ===== */
  .open-again {
    z-index: 1;
    padding: 11px 28px;
    background: var(--deep-rose);
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.6s 2s ease, transform 0.2s;
    box-shadow: 0 6px 24px rgba(192,74,42,0.4);
  }
  .open-again.show { opacity: 1; }
  .open-again:hover { transform: scale(1.05); }

  /* stars around envelope */
  .star {
    position: absolute;
    font-size: 18px;
    animation: starFloat 2.5s ease-in-out infinite;
    pointer-events: none;
    opacity: 0.7;
  }
  @keyframes starFloat {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    50%      { transform: translateY(-10px) rotate(15deg); opacity: 1; }
  }
</style>
</head>
<body>

<div id="particles"></div>

<!-- ===== ENVELOPE SCREEN ===== -->
<div id="envelope-screen">
  <p style="font-size:22px;font-weight:800;color:var(--text);letter-spacing:0.5px;">You've got a surprise! 🎀</p>

  <div style="position:relative;display:inline-block;">
    <!-- floating stars -->
    <div class="star" style="top:-30px;left:-20px;animation-delay:0s;">✨</div>
    <div class="star" style="top:-10px;right:-30px;animation-delay:0.6s;">🌸</div>
    <div class="star" style="bottom:0px;left:-40px;animation-delay:1.1s;">💫</div>
    <div class="star" style="bottom:20px;right:-25px;animation-delay:1.7s;">🌟</div>

    <!-- ENVELOPE -->
    <div class="envelope-wrap" id="envelope" onclick="openEnvelope()">
      <svg width="260" height="190" viewBox="0 0 260 190" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
        <!-- body -->
        <rect x="10" y="60" width="240" height="130" rx="12" fill="#f5e0d8"/>
        <rect x="10" y="60" width="240" height="130" rx="12" fill="url(#envGrad)" stroke="#e0b8a8" stroke-width="1.5"/>
        <!-- left triangle -->
        <path d="M10 70 L130 140 L10 185" fill="#ead0c4"/>
        <!-- right triangle -->
        <path d="M250 70 L130 140 L250 185" fill="#e4c8bc"/>
        <!-- bottom fold line -->
        <path d="M10 185 L130 140 L250 185" fill="#f0d8cc" stroke="#e0b8a8" stroke-width="1"/>
        <!-- center seal -->
        <circle cx="130" cy="140" r="14" fill="#c04a2a" opacity="0.9"/>
        <text x="130" y="145" text-anchor="middle" font-size="14" fill="white">❤</text>
        <!-- flap (animated) -->
        <g id="env-flap" style="transform-style:preserve-3d">
          <path d="M10 62 L130 135 L250 62 Q240 50 130 50 Q20 50 10 62Z" fill="url(#flapGrad)" stroke="#e0b8a8" stroke-width="1.5"/>
        </g>
        <defs>
          <linearGradient id="envGrad" x1="10" y1="60" x2="250" y2="190" gradientUnits="userSpaceOnUse">
            <stop stop-color="#faeae0"/>
            <stop offset="1" stop-color="#f0d0c0"/>
          </linearGradient>
          <linearGradient id="flapGrad" x1="10" y1="50" x2="250" y2="135" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f8ddd0"/>
            <stop offset="1" stop-color="#eac8b8"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <p class="hint-text">👆 Tap the envelope to reveal</p>
</div>

<!-- ===== CARD SCREEN ===== -->
<div id="card-screen">
  <!-- bg leaves -->
  <svg class="bg-leaf" style="top:-20px;left:-30px;width:260px;transform:rotate(8deg)" viewBox="0 0 200 180" fill="none">
    <path d="M10 160 Q60 80 150 20" stroke="#8fa890" stroke-width="3" fill="none"/>
    <ellipse cx="80" cy="90" rx="35" ry="18" fill="#8fa890" transform="rotate(-30 80 90)"/>
    <ellipse cx="130" cy="55" rx="28" ry="14" fill="#7a9880" transform="rotate(-50 130 55)"/>
    <ellipse cx="40" cy="130" rx="30" ry="15" fill="#8fa890" transform="rotate(-10 40 130)"/>
    <ellipse cx="160" cy="25" rx="22" ry="11" fill="#9aaa90" transform="rotate(-60 160 25)"/>
  </svg>
  <svg class="bg-leaf" style="bottom:30px;right:-20px;width:230px;transform:rotate(200deg)" viewBox="0 0 200 180" fill="none">
    <path d="M10 160 Q60 80 150 20" stroke="#8fa890" stroke-width="3" fill="none"/>
    <ellipse cx="80" cy="90" rx="35" ry="18" fill="#8fa890" transform="rotate(-30 80 90)"/>
    <ellipse cx="130" cy="55" rx="28" ry="14" fill="#7a9880" transform="rotate(-50 130 55)"/>
    <ellipse cx="40" cy="130" rx="30" ry="15" fill="#8fa890" transform="rotate(-10 40 130)"/>
  </svg>
  <!-- pink flower bottom-left -->
  <svg class="bg-leaf" style="bottom:60px;left:-10px;width:160px;opacity:0.5" viewBox="0 0 150 160" fill="none">
    <line x1="75" y1="160" x2="75" y2="70" stroke="#8fa890" stroke-width="3"/>
    <ellipse cx="50" cy="100" rx="20" ry="9" fill="#a8c898" transform="rotate(-30 50 100)"/>
    <g transform="translate(75,55)">
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#d88aaa" opacity="0.9"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#d88aaa" opacity="0.9" transform="rotate(60)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#e09ab8" opacity="0.85" transform="rotate(120)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#d88aaa" opacity="0.9" transform="rotate(180)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#e09ab8" opacity="0.85" transform="rotate(240)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" fill="#d88aaa" opacity="0.9" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="7" fill="#f0c0c8"/>
    </g>
  </svg>

  <!-- THE CARD -->
  <div class="card-wrap">
    <div class="birthday-card" id="birthday-card">

      <!-- floral top-right -->
      <svg class="card-floral-tr" viewBox="0 0 160 160" fill="none">
        <ellipse cx="120" cy="30" rx="28" ry="12" fill="#8fa890" transform="rotate(-50 120 30)" opacity="0.7"/>
        <ellipse cx="140" cy="60" rx="22" ry="10" fill="#7a9880" transform="rotate(-20 140 60)" opacity="0.6"/>
        <ellipse cx="100" cy="15" rx="18" ry="8" fill="#9aaa90" transform="rotate(-70 100 15)" opacity="0.65"/>
        <g transform="translate(135,25)">
          <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#e8a080" opacity="0.9"/>
          <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#e8a080" opacity="0.9" transform="rotate(72)"/>
          <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#f0b090" opacity="0.85" transform="rotate(144)"/>
          <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#e8a080" opacity="0.9" transform="rotate(216)"/>
          <ellipse cx="0" cy="-10" rx="5" ry="10" fill="#f0b090" opacity="0.85" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="4" fill="#f8d0a0"/>
        </g>
        <g transform="translate(108,52)">
          <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#c06050" opacity="0.8"/>
          <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#c06050" opacity="0.8" transform="rotate(90)"/>
          <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#d07060" opacity="0.75" transform="rotate(180)"/>
          <ellipse cx="0" cy="-8" rx="4" ry="8" fill="#c06050" opacity="0.8" transform="rotate(270)"/>
          <circle cx="0" cy="0" r="3" fill="#f0c0a0"/>
        </g>
        <path d="M90 5 Q110 30 130 65" stroke="#8fa890" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M115 5 Q125 25 145 50" stroke="#8fa890" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="130" cy="65" rx="5" ry="8" fill="#e8a060" opacity="0.8" transform="rotate(20 130 65)"/>
        <ellipse cx="145" cy="50" rx="4" ry="6" fill="#f0c080" opacity="0.75"/>
      </svg>

      <!-- photo -->
      <div class="card-photo-section">
        <div class="card-photo-frame">
          <img src="1.jpg" alt="Birthday Photo" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"/>
        </div>
      </div>

      <!-- floral bottom-right -->
      <svg style="position:absolute;bottom:-10px;right:-5px;width:120px;height:120px" viewBox="0 0 120 120" fill="none">
        <ellipse cx="80" cy="90" rx="24" ry="10" fill="#8fa890" transform="rotate(30 80 90)" opacity="0.65"/>
        <ellipse cx="60" cy="105" rx="20" ry="9" fill="#7a9880" transform="rotate(10 60 105)" opacity="0.6"/>
        <g transform="translate(95,75)">
          <ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#e8c060" opacity="0.9"/>
          <ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#e8c060" opacity="0.9" transform="rotate(72)"/>
          <ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#f0d070" opacity="0.85" transform="rotate(144)"/>
          <ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#e8c060" opacity="0.9" transform="rotate(216)"/>
          <ellipse cx="0" cy="-9" rx="4.5" ry="9" fill="#f0d070" opacity="0.85" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="4" fill="#fff8e0"/>
        </g>
      </svg>

      <!-- text -->
      <div class="card-body">
        <div class="card-title">Happy Birthday</div>
        <div class="card-subtitle">My Dear 🌿</div>
        <div class="card-divider"></div>
        <p class="card-message">
          Many Many best wishes <br>
          friendly neighbourhood Spidey!<br>
          May you swing through life with joy<br>
          and always be amazing. 🕷️
        </p>
        <div class="card-heart">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="#c04a2a">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <button class="open-again" id="open-again-btn" onclick="resetToEnvelope()">Open Again 💌</button>
</div>

<script>
  // ===== PARTICLES =====
  const colors = ['#e89060','#f8d080','#e8b4a8','#8fa890','#c04a2a','#d88aaa'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 7;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*10}s;
    `;
    document.getElementById('particles').appendChild(p);
  }

  // ===== CONFETTI =====
  function spawnConfetti(count = 80) {
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = 8 + Math.random() * 8;
      c.style.cssText = `
        left:${Math.random()*100}%;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'3px'};
        animation-duration:${1.8+Math.random()*2}s;
        animation-delay:${Math.random()*0.6}s;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  // ===== OPEN ENVELOPE =====
  function openEnvelope() {
    const env = document.getElementById('envelope');
    if (env.classList.contains('opening')) return;
    env.classList.add('opening');

    setTimeout(() => {
      document.getElementById('envelope-screen').classList.add('hide');
      document.getElementById('card-screen').classList.add('show');
      spawnConfetti(90);

      setTimeout(() => {
        document.getElementById('birthday-card').classList.add('revealed');
      }, 300);

      setTimeout(() => {
        document.getElementById('open-again-btn').classList.add('show');
      }, 2200);
    }, 900);
  }

  // ===== RESET =====
  function resetToEnvelope() {
    const card = document.getElementById('birthday-card');
    card.classList.remove('revealed');
    document.getElementById('open-again-btn').classList.remove('show');

    setTimeout(() => {
      document.getElementById('card-screen').classList.remove('show');
      const envScreen = document.getElementById('envelope-screen');
      envScreen.classList.remove('hide');

      const env = document.getElementById('envelope');
      env.classList.remove('opening');
    }, 400);
  }
</script>
</body>
</html>
